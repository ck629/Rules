mixed-port: 56789
allow-lan: true
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090
external-ui: /home/mihomo/ui
secret: "password"
dns:
 enable: true
 ipv6: false
 prefer-h3: true
 nameserver:
   - tls://223.5.5.5
   - tls://1.12.12.12
   - https://223.5.5.5/dns-query
   - https://1.12.12.12/dns-query
 enhanced-mode: fake-ip
 fake-ip-range: 198.18.0.1/16
 fake-ip-filter:
  - '+.lan'
  - '+.local'
hosts:
 'api.dalaie.com': '127.0.0.1'
proxy-providers:
 subscription:
  type: http
  url: "https://"
  interval: 3600
proxy-groups:
 - name: PROXY
   type: select
   url: http://www.google.com/generate_204
   interval: 900
   use:
    - subscription
rule-providers:
  REJECT:
    behavior: "domain"
    type: http
    url: "https://raw.githubusercontent.com/ck629/Rules/main/Clash/reject.yaml"
  DIRECT:
    behavior: "domain"
    type: http
    url: "https://raw.githubusercontent.com/ck629/Rules/main/Clash/direct.yaml"
  PROXY:
    behavior: "domain"
    type: http
    url: "https://raw.githubusercontent.com/ck629/Rules/main/Clash/proxy.yaml"
  AI:
    behavior: "domain"
    type: http
    url: "https://raw.githubusercontent.com/ck629/Rules/main/Clash/ai.yaml"
  NSFW:
    behavior: "domain"
    type: http
    url: "https://raw.githubusercontent.com/ck629/Rules/main/Clash/nsfw.yaml"
  AntiAD:
    behavior: "domain"
    type: http
    url: "https://anti-ad.net/clash.yaml"
    interval: 86400
    
rules:
 - RULE-SET,DIRECT,DIRECT
 - RULE-SET,REJECT,REJECT
 - RULE-SET,AntiAD,REJECT
 - DOMAIN-KEYWORD,adinall,REJECT
 - DOMAIN-KEYWORD,adservice,REJECT
 - DOMAIN-KEYWORD,adsmind,REJECT
 - DOMAIN-KEYWORD,adsserving,REJECT
 - DOMAIN-KEYWORD,advertis,REJECT
 - DOMAIN-KEYWORD,cnzz,REJECT
 - DOMAIN-KEYWORD,inmobi,REJECT
 - DOMAIN-KEYWORD,umeng,REJECT
 - RULE-SET,PROXY,PROXY
 - RULE-SET,AI,PROXY
 - RULE-SET,NSFW,PROXY
 - DOMAIN-KEYWORD,discord,PROXY
 - DOMAIN-KEYWORD,duckduckgo,PROXY
 - DOMAIN-KEYWORD,facebook,PROXY
 - DOMAIN-KEYWORD,github,PROXY
 - DOMAIN-KEYWORD,google,PROXY
 - DOMAIN-KEYWORD,instagram,PROXY
 - DOMAIN-KEYWORD,notion,PROXY
 - DOMAIN-KEYWORD,onedrive,PROXY
